name: CMake Build

on:
  push:
    branches: [master]

  pull_request:
    branches: [master]

  workflow_dispatch:

jobs:
  build-win:
    name: Build Windows
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v7

      - name: Intel Fortran cache
        id: cache-intel-fortran
        uses: actions/cache@v5
        with:
          path: C:\Program Files (x86)\Intel\oneAPI
          key: ${{ runner.os }}-intel-fortran-${{ hashFiles('Install-IntelFortranWindows.ps1') }}

      - name: Install Intel Fortran
        if: steps.cache-intel-fortran.outputs.cache-hit != 'true'
        run: ./Install-IntelFortranWindows.ps1

      - name: Conan cache
        uses: actions/cache@v5
        with:
          path: .conan/p
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py', 'conanfile.py.lock', 'conan.lock') }}

      - name: Build OpenSees
        run: uv run conanfile.py

      - uses: actions/upload-artifact@v4
        with:
          name: OpenSees_Win
          path: build/Release/install

  build-ubuntu:
    name: Build Ubuntu
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Conan cache
        uses: actions/cache@v5
        with:
          path: |
            .conan/p
            .uv-cache
          key: ${{ runner.os }}-conan-${{ hashFiles('conanfile.py', 'conanfile.py.lock', 'conan.lock', '.devcontainer/Dockerfile') }}

      - name: Docker image cache
        id: cache-docker-image
        uses: actions/cache@v5
        with:
          path: |
            /tmp/devcontainer-image.tar
          key: ${{ runner.os }}-docker-image-${{ hashFiles('.devcontainer/Dockerfile') }}

      - name: Build Docker image
        if: steps.cache-docker-image.outputs.cache-hit != 'true'
        run: |
          docker build \
            --tag opensees-build \
            --file .devcontainer/Dockerfile \
            .devcontainer
          docker save opensees-build -o /tmp/devcontainer-image.tar

      - name: Load Docker image from cache
        if: steps.cache-docker-image.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/devcontainer-image.tar

      - name: Run build in container
        run: |
          docker run --rm \
            -u $(id -u):$(id -g) \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e CONAN_HOME=/workspace/.conan \
            -e UV_CACHE_DIR=/workspace/.uv-cache \
            opensees-build \
            uv run conanfile.py

      - uses: actions/upload-artifact@v4
        with:
          name: OpenSees_Linux
          path: build/Release/install
